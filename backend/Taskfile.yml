version: "3"

tasks:
  install:backend:
    desc: go mod download for the backend workspace
    cmds:
      - go mod download

  build:backend:
    desc: Build the API binary with Go (writes backend/api/recipes-api)
    cmds:
      - CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o api/recipes-api ./api

  build:image:api:
    desc: Build the Go API image ({{.IMAGE_API}}:{{.TAG}}; release adds :{{.VERSION}} and :latest)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - |
        set -e
        tags=(-t "{{.IMAGE_API}}:{{.TAG}}")
        if [ -n "${RELEASE_VERSION:-}" ]; then
          tags+=(-t "{{.IMAGE_API}}:${RELEASE_VERSION}" -t "{{.IMAGE_API}}:latest")
        fi
        docker build "${tags[@]}" -f backend/Dockerfile backend

  test:backend:
    desc: go test for all workspace modules
    cmds:
      - go test ./api/... ./repo/... ./types/... ./cli/...

  dev:api:
    desc: Run the API locally on :4000 (expects Postgres; see task db:up)
    interactive: true
    cmds:
      - go run ./api

  clean:backend:
    desc: Remove backend/api/recipes-api if present
    dir: "{{.ROOT_DIR}}"
    cmds:
      - rm -f backend/api/recipes-api
