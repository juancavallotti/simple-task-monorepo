{{- $apiBase := include "recipes.webRecipesApiBase" . | trim }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recipes.fullname" . }}-web
  labels:
    {{- include "recipes.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "recipes.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "recipes.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      initContainers:
        - name: wait-for-backend
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          env:
            - name: BACKEND_HOST
              value: {{ include "recipes.backend.serviceName" . | quote }}
          command:
            - sh
            - -c
            - |
              until node -e "require('net').connect(4000,process.env.BACKEND_HOST,function(){process.exit(0)}).on('error',function(){process.exit(1)})"; do
                echo "waiting for backend"; sleep 2
              done
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            {{- if ne $apiBase "" }}
            - name: RECIPES_API_BASE
              value: {{ $apiBase | quote }}
            {{- end }}
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
