apiVersion: v1
kind: Service
metadata:
  name: {{ include "recipes.postgres.serviceName" . }}
  labels:
    {{- include "recipes.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
  selector:
    {{- include "recipes.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
