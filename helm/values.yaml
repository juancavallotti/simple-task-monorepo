# Images match `task build:images` / devspace (${DOCKER_USER}/recipes-*).
nameOverride: ""
fullnameOverride: ""

postgres:
  image:
    repository: juancavallotti/recipes-db
    tag: latest
    pullPolicy: IfNotPresent
  auth:
    username: postgres
    password: postgres
    database: recipes
  storage:
    size: 10Gi
    storageClassName: ""
  resources: {}

backend:
  image:
    repository: juancavallotti/recipes-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources: {}

web:
  image:
    repository: juancavallotti/recipes-web
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  # Optional override for RECIPES_API_BASE (server-side loaders/actions only; no trailing slash).
  # Leave empty to use the in-cluster backend Service URL (works with or without Ingress).
  recipesApiBase: ""
  resources: {}
  service:
    type: NodePort
    port: 3000
    # Omit to auto-assign (30000–32767)
    nodePort: null

ingress:
  enabled: false
  # Routes only / to the web Service; backend API stays in-cluster (not on this Ingress).
  className: nginx
  host: recipes.local
  annotations: {}
