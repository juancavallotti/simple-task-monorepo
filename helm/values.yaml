# Images match `task build:images` / devspace. Release: `task release:images` (tags chart version + latest).
nameOverride: ""
fullnameOverride: ""

# Embedding provider used by both the backend (/search) and the agent.
# Either "gemini" or "openai". The backend will only inject the key
# matching this choice; the agent receives whatever keys are set.
embeddingProvider: gemini

postgres:
  image:
    repository: juancavallotti/recipes-db
    tag: latest
    pullPolicy: IfNotPresent
  auth:
    username: postgres
    password: postgres
    database: recipes
  storage:
    size: 10Gi
    storageClassName: ""
  resources: {}

backend:
  image:
    repository: juancavallotti/recipes-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources: {}

agent:
  image:
    repository: juancavallotti/recipes-agent
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  model: gemini-3.1-flash-lite
  imageModel: gemini-3.1-flash-image-preview
  openAIModel: gpt-5.4-mini
  openAIImageModel: gpt-image-1-mini
  anthropicModel: claude-haiku-4-5
  imageGenerationConcurrency: 3
  imageScratch:
    mountPath: /agent-images
    sizeLimit: 100Mi
  # Secret containing agent provider API keys.
  # Production options:
  # - set name to reference an existing Secret; or
  # - set create=true and pass value via --set-string / a private values file.
  # DevSpace creates the default recipes-agent Secret from agent/.env before deploying.
  geminiApiKeySecret:
    create: false
    name: ""
    key: GEMINI_API_KEY
    value: ""
  # Optional provider keys. When geminiApiKeySecret.create=true, non-empty values
  # are added to the same Secret. Existing Secrets may provide these keys directly.
  openaiApiKeySecret:
    key: OPENAI_API_KEY
    value: ""
  anthropicApiKeySecret:
    key: ANTHROPIC_API_KEY
    value: ""
  resources:
    requests:
      memory: 512Mi
  service:
    port: 4100

web:
  image:
    repository: juancavallotti/recipes-web
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  # Optional override for RECIPES_API_BASE (server-side loaders/actions only; no trailing slash).
  # Leave empty to use the in-cluster backend Service URL (works with or without Ingress).
  recipesApiBase: ""
  resources: {}
  service:
    type: NodePort
    port: 3000
    # Omit to auto-assign (30000–32767)
    nodePort: null

ingress:
  enabled: false
  # Routes /agent to the agent Service and / to the web Service.
  className: nginx
  host: recipes.local
  annotations:
    # Keep the agent SSE endpoint open for long-running responses.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # Allow large attachment uploads (multipart overhead beyond the raw file).
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
  # TLS via cert-manager. When enabled, cert-manager issues a cert for `host`
  # using the named ClusterIssuer and stores it in `secretName`.
  # Apply helm/extras/selfsigned-cluster-issuer.yaml once per cluster to provision the issuer.
  tls:
    enabled: false
    secretName: recipes-tls
    clusterIssuer: selfsigned-ca
