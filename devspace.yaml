version: v2beta1
name: simple-task-monorepo

vars:
  DEVSPACE_ENV_FILE: agent/.env
  DOCKER_USER:
    source: env
    default: juancavallotti
  GEMINI_API_KEY:
    source: env
    default: ""
  IMAGE_TAG:
    source: command
    command: date
    args: ["+%Y%m%d-%H%M%S"]

images:
  db:
    image: ${DOCKER_USER}/recipes-db
    tags:
      - ${IMAGE_TAG}
    context: ./database
    dockerfile: ./database/Dockerfile
    skipPush: true
    createPullSecret: false

  api:
    image: ${DOCKER_USER}/recipes-api
    tags:
      - ${IMAGE_TAG}
    context: ./backend
    dockerfile: ./backend/Dockerfile
    skipPush: true
    createPullSecret: false

  apidev:
    image: ${DOCKER_USER}/recipes-api-dev
    tags:
      - ${IMAGE_TAG}
    context: ./backend
    dockerfile: ./backend/Dockerfile.dev
    skipPush: true
    createPullSecret: false

  agent:
    image: ${DOCKER_USER}/recipes-agent
    tags:
      - ${IMAGE_TAG}
    context: .
    dockerfile: ./agent/Dockerfile
    skipPush: true
    createPullSecret: false

  agentdev:
    image: ${DOCKER_USER}/recipes-agent-dev
    tags:
      - ${IMAGE_TAG}
    context: .
    dockerfile: ./agent/Dockerfile.dev
    skipPush: true
    createPullSecret: false

  web:
    image: ${DOCKER_USER}/recipes-web
    tags:
      - ${IMAGE_TAG}
    context: ./web
    dockerfile: ./web/Dockerfile
    skipPush: true
    createPullSecret: false

  webdev:
    image: ${DOCKER_USER}/recipes-web-dev
    tags:
      - ${IMAGE_TAG}
    context: ./web
    dockerfile: ./web/Dockerfile.dev
    skipPush: true
    createPullSecret: false

deployments:
  recipes:
    helm:
      releaseName: recipes
      chart:
        name: ./helm
      valuesFiles:
        - ./helm/values.yaml
      values:
        # Never only works if the image is already on the node (e.g. kind load). IfNotPresent
        # uses images from the same Docker daemon as Docker Desktop Kubernetes after build_images.
        postgres:
          image:
            repository: ${runtime.images.db.image}
            tag: ${runtime.images.db.tag}
            pullPolicy: IfNotPresent
        backend:
          image:
            repository: ${runtime.images.api.image}
            tag: ${runtime.images.api.tag}
            pullPolicy: IfNotPresent
        agent:
          image:
            repository: ${runtime.images.agent.image}
            tag: ${runtime.images.agent.tag}
            pullPolicy: IfNotPresent
        web:
          image:
            repository: ${runtime.images.web.image}
            tag: ${runtime.images.web.tag}
            pullPolicy: IfNotPresent
          service:
            type: NodePort
            port: 3000

dev:
  api:
    labelSelector:
      app.kubernetes.io/component: backend
    devImage: ${runtime.images.apidev.image}:${runtime.images.apidev.tag}
    workingDir: /workspace/backend
    command: ["go"]
    args: ["run", "./api"]
    restartHelper:
      inject: true
    sync:
      - path: ./backend:/workspace/backend
        uploadExcludePaths:
          - .git/
          - api/recipes-api
          - cli/recipes-cli
          - "**/*.test"
          - "**/*.out"
        onUpload:
          restartContainer: true
    ports:
      - port: "4000:4000"
  agent:
    labelSelector:
      app.kubernetes.io/component: agent
    devImage: ${runtime.images.agentdev.image}:${runtime.images.agentdev.tag}
    workingDir: /workspace
    command: ["sh", "-c"]
    args:
      - cd /workspace/backend && go build -o /usr/local/bin/recipes-cli ./cli && cd /workspace/agent && go run .
    restartHelper:
      inject: true
    sync:
      - path: ./agent:/workspace/agent
        uploadExcludePaths:
          - recipes-agent
          - "**/*.test"
          - "**/*.out"
        onUpload:
          restartContainer: true
      - path: ./backend:/workspace/backend
        uploadExcludePaths:
          - api/recipes-api
          - cli/recipes-cli
          - "**/*.test"
          - "**/*.out"
        onUpload:
          restartContainer: true
    ports:
      - port: "4100:4100"
  web:
    labelSelector:
      app.kubernetes.io/component: web
    devImage: ${runtime.images.webdev.image}:${runtime.images.webdev.tag}
    workingDir: /workspace/web
    command: ["npm"]
    args: ["run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    sync:
      - path: ./web:/workspace/web
        uploadExcludePaths:
          - node_modules/
          - build/
        onUpload:
          exec:
            - name: npm install
              command: npm install
              onChange:
                - package.json
                - package-lock.json
    ports:
      - port: "3000:3000"

pipelines:
  dev:
    run: |-
      build_images --all
      if [ -z "${GEMINI_API_KEY}" ]; then
        echo "GEMINI_API_KEY is required. Set it in agent/.env or export it before running devspace."
        exit 1
      fi
      kubectl create secret generic recipes-agent -n ${DEVSPACE_NAMESPACE} \
        --from-literal=GEMINI_API_KEY="${GEMINI_API_KEY}" \
        --dry-run=client -o yaml | kubectl apply -f -
      create_deployments --all
      start_dev --all
  deploy:
    run: |-
      build_images --all
      if [ -z "${GEMINI_API_KEY}" ]; then
        echo "GEMINI_API_KEY is required. Set it in agent/.env or export it before running devspace."
        exit 1
      fi
      kubectl create secret generic recipes-agent -n ${DEVSPACE_NAMESPACE} \
        --from-literal=GEMINI_API_KEY="${GEMINI_API_KEY}" \
        --dry-run=client -o yaml | kubectl apply -f -
      create_deployments --all