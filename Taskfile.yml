version: "3"

vars:
  DOCKER_USER:
    sh: '[ -n "$DOCKER_USER" ] && printf %s "$DOCKER_USER" || printf %s juancavallotti'
  IMAGE_DB: "{{.DOCKER_USER}}/recipes-db"
  IMAGE_API: "{{.DOCKER_USER}}/recipes-api"
  IMAGE_WEB: "{{.DOCKER_USER}}/recipes-web"
  TAG: latest

includes:
  db:
    taskfile: ./database/Taskfile.yml
    dir: "{{.ROOT_DIR}}"
    flatten: true
  web:
    taskfile: ./web/Taskfile.yml
    dir: ./web
    flatten: true
  backend:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
    flatten: true
  helm:
    taskfile: ./helm/Taskfile.yml
    dir: "{{.ROOT_DIR}}"
    flatten: true

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task -l

  install:
    desc: Install web dependencies and download Go modules
    deps: [install:web, install:backend]

  build:images:
    desc: Build all container images (db, API, web)
    deps: [build:image:db, build:image:api, build:image:web]

  push:images:
    desc: Push all images to Docker Hub ({{.DOCKER_USER}}/recipes-*:{{.TAG}})
    deps: [build:images]
    cmds:
      - docker push {{.IMAGE_DB}}:{{.TAG}}
      - docker push {{.IMAGE_API}}:{{.TAG}}
      - docker push {{.IMAGE_WEB}}:{{.TAG}}

  test:
    desc: Run web and backend tests
    deps: [test:web, test:backend]

  dev:
    desc: Kubernetes dev loop (build images, deploy Helm, DevSpace sync) — requires devspace + cluster
    dir: "{{.ROOT_DIR}}"
    cmds:
      - devspace dev

  deploy:
    desc: Build images and deploy Helm only (no DevSpace file sync)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - devspace run-pipeline deploy

  dev:local:
    desc: API + web dev servers together (Postgres not started — use task db:up in another shell)
    dir: "{{.ROOT_DIR}}"
    interactive: true
    cmds:
      - |
        set -e
        trap 'kill $(jobs -p) 2>/dev/null; true' EXIT INT TERM
        (cd backend && exec go run ./api) &
        (cd web && exec npm run dev) &
        wait

  clean:
    desc: Remove build artifacts (web/build, local API binary)
    deps: [clean:web, clean:backend]

  clean:full:
    desc: clean + clean:deps
    deps: [clean, clean:deps]
