version: "3"

vars:
  DOCKER_USER:
    sh: '[ -n "$DOCKER_USER" ] && printf %s "$DOCKER_USER" || printf %s juancavallotti'
  IMAGE_DB: "{{.DOCKER_USER}}/recipes-db"
  IMAGE_API: "{{.DOCKER_USER}}/recipes-api"
  IMAGE_AGENT: "{{.DOCKER_USER}}/recipes-agent"
  IMAGE_WEB: "{{.DOCKER_USER}}/recipes-web"
  TAG: latest
  VERSION:
    sh: '[ -n "$VERSION" ] && printf %s "$VERSION" || helm show chart helm | awk "/^version:/ {print \$2}"'

includes:
  db:
    taskfile: ./database/Taskfile.yml
    dir: "{{.ROOT_DIR}}"
    flatten: true
  web:
    taskfile: ./web/Taskfile.yml
    dir: ./web
    flatten: true
  backend:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
    flatten: true
  agent:
    taskfile: ./agent/Taskfile.yml
    dir: ./agent
    flatten: true
  helm:
    taskfile: ./helm/Taskfile.yml
    dir: "{{.ROOT_DIR}}"
    flatten: true

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task -l

  install:
    desc: Install web dependencies and download Go modules
    deps: [install:web, install:backend, install:agent]

  build:images:
    desc: Build all container images (db, API, agent, web)
    deps: [build:image:db, build:image:api, build:image:agent, build:image:web]

  push:images:
    desc: Push all images ({{.TAG}} only — use release:images for version + latest)
    deps: [build:images]
    cmds:
      - docker push {{.IMAGE_DB}}:{{.TAG}}
      - docker push {{.IMAGE_API}}:{{.TAG}}
      - docker push {{.IMAGE_AGENT}}:{{.TAG}}
      - docker push {{.IMAGE_WEB}}:{{.TAG}}

  publish:ttlsh:
    desc: Push all images to ttl.sh (ephemeral OCI registry) and write dist/values.ttlsh.yaml
    deps: [build:images]
    cmds:
      - ./scripts/ttlsh-publish.sh

  release:images:
    desc: Build and push all images tagged {{.VERSION}} and latest (version from helm/Chart.yaml)
    deps: [build:images:release]
    cmds:
      - docker push {{.IMAGE_DB}}:{{.VERSION}}
      - docker push {{.IMAGE_DB}}:latest
      - docker push {{.IMAGE_API}}:{{.VERSION}}
      - docker push {{.IMAGE_API}}:latest
      - docker push {{.IMAGE_AGENT}}:{{.VERSION}}
      - docker push {{.IMAGE_AGENT}}:latest
      - docker push {{.IMAGE_WEB}}:{{.VERSION}}
      - docker push {{.IMAGE_WEB}}:latest

  build:images:release:
    desc: Build all images with {{.VERSION}} and latest tags
    cmds:
      - RELEASE_VERSION={{.VERSION}} task build:image:db
      - RELEASE_VERSION={{.VERSION}} task build:image:api
      - RELEASE_VERSION={{.VERSION}} task build:image:agent
      - RELEASE_VERSION={{.VERSION}} task build:image:web

  test:
    desc: Run web and backend tests
    deps: [test:web, test:backend, test:agent]

  dev:
    desc: Kubernetes dev loop (build images, deploy Helm, DevSpace sync) — requires devspace + cluster
    dir: "{{.ROOT_DIR}}"
    cmds:
      - devspace dev

  deploy:
    desc: Build images and deploy Helm only (no DevSpace file sync)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - devspace run-pipeline deploy

  dev:local:
    desc: API + web dev servers together (Postgres not started — use task db:up in another shell)
    dir: "{{.ROOT_DIR}}"
    interactive: true
    cmds:
      - |
        set -e
        trap 'kill $(jobs -p) 2>/dev/null; true' EXIT INT TERM
        (cd backend && exec go run ./api) &
        (cd web && exec npm run dev) &
        wait

  clean:
    desc: Remove build artifacts (web/build, local Go binaries)
    deps: [clean:web, clean:backend, clean:agent]

  clean:full:
    desc: clean + clean:deps
    deps: [clean, clean:deps]
